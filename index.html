<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>손절횟수 비교 분석기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 20px;
            background-color: #f7f9fc;
        }
        h1 {
            color: #333;
        }
        .upload-section {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .upload-section div {
            margin-bottom: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #0056b3;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #004494;
        }
        .result-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .result-box {
            flex: 1 1 calc(50% - 20px);
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            min-width: 300px;
        }
        .result-box h3 {
            margin-top: 0;
            color: #444;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
            max-height: 300px;
            overflow-y: auto;
        }
        li {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

    <h1>누적 손절횟수 비교 분석기</h1>
    
    <div class="upload-section">
        <div>
            <label><strong>1. 전자 파일 (그룹 B, C, D 형식):</strong></label><br>
            <input type="file" id="fileInput1" multiple accept=".csv, .xlsx, .xls">
            <small style="color:gray;">* 여러 파일을 한 번에 선택할 수 있습니다.</small>
        </div>
        <div>
            <label><strong>2. 후자 파일 (그룹 A 형식):</strong></label><br>
            <input type="file" id="fileInput2" multiple accept=".csv, .xlsx, .xls">
            <small style="color:gray;">* 여러 파일을 한 번에 선택할 수 있습니다.</small>
        </div>
        <button onclick="analyzeFiles()">분석 실행</button>
    </div>

    <div id="results" class="result-container" style="display: none;">
        <div class="result-box">
            <h3>1. 교집합 (전자 양수 & 후자 양수) <span id="count-both"></span></h3>
            <ul id="list-both"></ul>
        </div>
        <div class="result-box">
            <h3>2. 전자만 양수 (전자 양수 & 후자 0이하) <span id="count-first"></span></h3>
            <ul id="list-first"></ul>
        </div>
        <div class="result-box">
            <h3>3. 후자만 양수 (전자 0이하 & 후자 양수) <span id="count-second"></span></h3>
            <ul id="list-second"></ul>
        </div>
        <div class="result-box">
            <h3>4. 둘 다 양수가 아님 (전자 0이하 & 후자 0이하) <span id="count-none"></span></h3>
            <ul id="list-none"></ul>
        </div>
    </div>

    <script>
        // 파일을 ArrayBuffer로 읽어오는 함수
        function readFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(new Uint8Array(e.target.result));
                reader.onerror = (e) => reject(e);
                reader.readAsArrayBuffer(file);
            });
        }

        // 파일들을 순회하며 그룹별 누적 손절횟수를 계산하는 함수
        async function parseFilesAndSumLoss(files) {
            const groupCounts = {};

            for (let file of files) {
                const data = await readFile(file);
                // SheetJS를 이용해 엑셀/CSV 파싱
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // 2차원 배열 형태로 시트 데이터 가져오기
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                // 상단은 요약이므로 "Group Name"이 있는 헤더 행을 찾습니다.
                let headerRowIdx = -1;
                for (let i = 0; i < Math.min(jsonData.length, 20); i++) {
                    if (jsonData[i] && jsonData[i].includes("Group Name")) {
                        headerRowIdx = i;
                        break;
                    }
                }

                // 예상되는 헤더 포맷이 없는 경우 패스
                if (headerRowIdx === -1) continue;

                const headerRow = jsonData[headerRowIdx];
                const groupIdx = headerRow.indexOf("Group Name");
                const lossIdx = headerRow.indexOf("손절횟수");

                if (groupIdx === -1 || lossIdx === -1) continue;

                // 헤더 행 다음(5행 아래)부터 개별 그룹 데이터로 간주
                for (let i = headerRowIdx + 1; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    
                    // 빈 행이거나 그룹명이 없으면 패스
                    if (!row || row.length === 0 || !row[groupIdx]) continue;

                    const groupName = row[groupIdx].toString().trim();
                    const lossCount = Number(row[lossIdx]) || 0;

                    if (!groupCounts[groupName]) {
                        groupCounts[groupName] = 0;
                    }
                    // 손절 횟수 누적
                    groupCounts[groupName] += lossCount;
                }
            }
            return groupCounts;
        }

        // 메인 분석 실행 함수
        async function analyzeFiles() {
            const files1 = document.getElementById('fileInput1').files;
            const files2 = document.getElementById('fileInput2').files;

            if (files1.length === 0 && files2.length === 0) {
                alert("분석할 파일(전자 또는 후자)을 업로드해주세요.");
                return;
            }

            try {
                // 각각의 입력칸에서 파일 데이터를 집계
                const counts1 = await parseFilesAndSumLoss(files1);
                const counts2 = await parseFilesAndSumLoss(files2);

                // 두 데이터셋에 존재하는 모든 그룹명 수집
                const allGroups = new Set([...Object.keys(counts1), ...Object.keys(counts2)]);

                const categoryBoth = [];
                const categoryFirstOnly = [];
                const categorySecondOnly = [];
                const categoryNone = [];

                // 분류 로직
                allGroups.forEach(group => {
                    const c1 = counts1[group] || 0;
                    const c2 = counts2[group] || 0;

                    const isC1Positive = c1 > 0;
                    const isC2Positive = c2 > 0;

                    if (isC1Positive && isC2Positive) {
                        categoryBoth.push({ name: group, val1: c1, val2: c2 });
                    } else if (isC1Positive && !isC2Positive) {
                        categoryFirstOnly.push({ name: group, val1: c1, val2: c2 });
                    } else if (!isC1Positive && isC2Positive) {
                        categorySecondOnly.push({ name: group, val1: c1, val2: c2 });
                    } else {
                        categoryNone.push({ name: group, val1: c1, val2: c2 });
                    }
                });

                // 화면에 결과 렌더링
                renderList('list-both', 'count-both', categoryBoth);
                renderList('list-first', 'count-first', categoryFirstOnly);
                renderList('list-second', 'count-second', categorySecondOnly);
                renderList('list-none', 'count-none', categoryNone);

                document.getElementById('results').style.display = 'flex';

            } catch (error) {
                console.error(error);
                alert("파일을 처리하는 도중 오류가 발생했습니다. 콘솔을 확인해주세요.");
            }
        }

        // 결과를 HTML 리스트로 출력하는 헬퍼 함수
        function renderList(elementId, countId, dataArray) {
            const ul = document.getElementById(elementId);
            const countSpan = document.getElementById(countId);
            
            ul.innerHTML = ''; // 초기화
            countSpan.textContent = `(${dataArray.length}건)`;

            if (dataArray.length === 0) {
                ul.innerHTML = '<li style="color:#999;">해당되는 그룹이 없습니다.</li>';
                return;
            }

            dataArray.forEach(item => {
                const li = document.createElement('li');
                // 누적 데이터 표시 형식: 그룹명 (전자 손절합: X, 후자 손절합: Y)
                li.innerHTML = `<strong>${item.name}</strong> <span style="font-size:14px; color:gray;">(전자: ${item.val1}, 후자: ${item.val2})</span>`;
                ul.appendChild(li);
            });
        }
    </script>
</body>
</html>
